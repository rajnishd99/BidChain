# Contracts CI — runs on every push to main and every PR that touches
# the Rust workspace.
#
# Pipeline: checkout → install Rust toolchain → cache Cargo target →
# install stellar-cli + wasm32 target → cargo test (release) →
# stellar contract build → verify the produced .wasm → upload as an
# artifact.
#
# Triggers: only on changes that affect the contracts (contracts/**,
# Cargo.toml, Cargo.lock, or the workflow file). Frontend changes are
# handled by ci.yml.

name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/contracts.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/contracts.yml"
  workflow_dispatch:

concurrency:
  group: contracts-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test + Build WASM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system build dependencies
        # stellar-cli transitively pulls in crates (e.g. notify-rust) that
        # need libdbus + pkg-config at build time on Linux runners.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Install stellar CLI
        run: |
          set -euo pipefail
          if ! command -v stellar >/dev/null 2>&1; then
            cargo install --locked stellar-cli
          else
            echo "stellar CLI already present: $(stellar --version | head -n1)"
          fi

      - name: Add wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: cargo test (release)
        run: cargo test --release --workspace --all-targets

      - name: stellar contract build
        run: stellar contract build
        working-directory: contracts

      - name: Verify WASM output
        run: |
          set -euo pipefail
          ls -l target/wasm32v1-none/release/*.wasm
          # Quick sanity: every exported function in the WASM is
          # a real auction entry point.
          stellar contract info interface \
            --wasm target/wasm32v1-none/release/auction.wasm \
            --output json > /tmp/auction.abi.json
          python3 -c "import json,sys; abi=json.load(open('/tmp/auction.abi.json')); funcs={e['function_v0']['name'] for e in abi if 'function_v0' in e}; expected={'__constructor','create_auction','bid','settle','get_auction','list_auctions','get_reputation'}; missing=expected-funcs; assert not missing, f'missing exported functions: {missing}'; print('exported functions OK:', sorted(funcs))"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: auction-wasm
          path: target/wasm32v1-none/release/auction.wasm
          if-no-files-found: error
          retention-days: 7
