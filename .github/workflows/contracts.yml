# Contracts CI: build, test, and produce optimised WASM for every
# push/PR that touches `contracts/**` (or main).
#
# Per spec §8: cache Cargo registry, install wasm32 target, run
# `cargo build --release` + `cargo test`, and run `stellar contract
# build` to produce the deployable WASM.

name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/contracts.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/contracts.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli --features opt

      - name: Add wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: cargo build --release
        run: cargo build --release

      - name: cargo test
        run: cargo test --release --all

      - name: stellar contract build
        working-directory: contracts
        run: stellar contract build

      - name: Verify WASM output
        run: |
          ls -l target/wasm32v1-none/release/*.wasm
