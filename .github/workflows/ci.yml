# Frontend CI — runs on every push to main and every PR.
#
# Pipeline: checkout → setup-node → install → type-check
# → build → upload .next artifact.
#
# Triggers: only on changes that affect the front-end (src/, scripts/,
# package.json, pnpm-lock.yaml, the workflow file, or the Next.js
# config). Contract changes are handled by contracts.yml.

name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "next.config.mjs"
      - "tsconfig.json"
      - ".npmrc"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "next.config.mjs"
      - "tsconfig.json"
      - ".npmrc"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          if-no-files-found: warn
          retention-days: 3
